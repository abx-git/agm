name: Blueprint Pattern integrity check

on:
  push:
    paths:
      - '**.md'
      - '.mlc-config.json'
      - '.github/workflows/blueprint-pattern-integrity.yml'
  pull_request:
    paths:
      - '**.md'
      - '.mlc-config.json'
      - '.github/workflows/blueprint-pattern-integrity.yml'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links in architecture docs
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          folder-path: docs
          config-file: .mlc-config.json
