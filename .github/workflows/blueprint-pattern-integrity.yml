name: AGM integrity check

on:
  push:
    paths:
      - '**.md'
      - '.mlc-config.json'
      - 'scripts/check-okf-frontmatter.py'
      - '.github/workflows/blueprint-pattern-integrity.yml'
  pull_request:
    paths:
      - '**.md'
      - '.mlc-config.json'
      - 'scripts/check-okf-frontmatter.py'
      - '.github/workflows/blueprint-pattern-integrity.yml'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check Markdown links in docs
        run: find docs -name '*.md' -print0 | xargs -0 npx --yes markdown-link-check -c .mlc-config.json

  okf-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate OKF YAML frontmatter (required type field)
        run: python3 scripts/check-okf-frontmatter.py docs/templates/architecture
