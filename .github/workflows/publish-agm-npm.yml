name: Publish @abx-hh/agm-cli to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'npm publish --dry-run only'
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    defaults:
      run:
        working-directory: agm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm token
        if: ${{ !inputs.dry_run }}
        run: |
          test -n "$NODE_AUTH_TOKEN" || (echo "::error::NPM_TOKEN secret is missing" && exit 1)
          npm whoami
          echo "Token OK. Publish requires a Granular Access Token with 'Bypass two-factor authentication (2FA)' enabled."

      - name: Install and build
        run: |
          npm ci
          test -f data/workflows-prompts-compressed.json || (echo "Run scripts/agm-compress-prompts.mjs first" && exit 1)
          npm run build

      - name: Publish (dry run)
        if: inputs.dry_run
        run: npm publish --access public --dry-run

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public
