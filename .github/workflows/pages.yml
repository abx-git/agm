name: Deploy Blueprint Assistant (GitHub Pages)

# Publishes docs/assistant/ to the gh-pages branch.
# In repo Settings → Pages: Source = "Deploy from a branch", branch gh-pages, folder / (root).

on:
  push:
    branches: [main]
    paths:
      - 'docs/assistant/**'
      - 'prompts/workflows/**'
      - 'scripts/sync-assistant-data.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync workflow prompts into assistant data
        run: python3 scripts/sync-assistant-data.py

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/assistant
          publish_branch: gh-pages
          commit_message: 'Deploy Blueprint Assistant'
