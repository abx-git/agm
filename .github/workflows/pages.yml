name: Deploy Blueprint Assistant (GitHub Pages)

# Publishes docs/assistant/ to https://github.com/abx-git/agm.github.io
# Live URL: https://abx-git.github.io/agm.github.io/

on:
  push:
    branches: [main]
    paths:
      - 'docs/assistant/**'
      - 'prompts/adopt-standalone.md'
      - 'prompts/workflows/**'
      - 'scripts/sync-assistant-data.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: deploy-agm-github-io
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require deploy token
        env:
          TOKEN: ${{ secrets.AGM_GHIO_DEPLOY }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::Add repo secret AGM_GHIO_DEPLOY (PAT with repo scope on abx-git/agm.github.io). See docs/assistant/GITHUB-PAGES-SETUP.md"
            exit 1
          fi

      - name: Sync workflow prompts into assistant data
        run: python3 scripts/sync-assistant-data.py

      - name: Deploy to agm.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.AGM_GHIO_DEPLOY }}
          external_repository: abx-git/agm.github.io
          publish_branch: main
          publish_dir: ./docs/assistant
          keep_files: true
          commit_message: 'Deploy Blueprint Assistant from blueprint-pattern@'
