name: Deploy Blueprint Assistant (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'docs/assistant/**'
      - 'prompts/workflows/**'
      - 'scripts/sync-assistant-data.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync workflow prompts into assistant data
        run: python3 scripts/sync-assistant-data.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/assistant

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
