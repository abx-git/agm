name: Deploy AGM Review Studio (GitHub Pages)

# Publishes docs/studio/dist to https://github.com/abx-git/agm.github.io
# Live URL: https://abx-git.github.io/agm.github.io/

on:
  push:
    branches: [main]
    paths:
      - 'docs/studio/**'
      - 'docs/assistant/**'
      - 'prompts/adopt-standalone.md'
      - 'prompts/workflows/**'
      - 'scripts/sync-assistant-data.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: deploy-agm-github-io
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy key + SSH preflight
        id: ssh
        env:
          ACTIONS_DEPLOY_KEY: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_DEPLOY_KEY:-}" ]; then
            echo "::error::Missing secret ACTIONS_DEPLOY_KEY on abx-git/agm. See docs/studio/GITHUB-PAGES-SETUP.md"
            exit 1
          fi

          python3 <<'PY'
          import os
          from pathlib import Path

          raw = os.environ["ACTIONS_DEPLOY_KEY"].strip()
          # GitHub UI / some tools store real newlines as the two-char sequence \n
          if "BEGIN" in raw and raw.count("\n") < 3 and "\\n" in raw:
              raw = raw.replace("\\n", "\n")
          raw = raw.replace("\r\n", "\n").replace("\r", "\n").strip() + "\n"
          if "BEGIN" not in raw or "PRIVATE KEY" not in raw:
              raise SystemExit(
                  "::error::ACTIONS_DEPLOY_KEY does not look like a private key "
                  "(expected -----BEGIN … PRIVATE KEY-----). You pasted the .pub file, or the secret is truncated."
              )
          path = Path(os.environ["RUNNER_TEMP"]) / "agm_pages_deploy_key"
          path.write_text(raw)
          path.chmod(0o600)
          print(f"Wrote deploy key ({path.stat().st_size} bytes)")
          PY

          KEY="${RUNNER_TEMP}/agm_pages_deploy_key"
          echo "DEPLOY_KEY_PATH=$KEY" >> "$GITHUB_ENV"

          echo "Public key derived from secret (must match Deploy Key on agm.github.io):"
          ssh-keygen -y -f "$KEY" | tee "${RUNNER_TEMP}/agm_pages_deploy_key.pub"
          echo "Fingerprint:"
          ssh-keygen -lf "${RUNNER_TEMP}/agm_pages_deploy_key.pub"

          eval "$(ssh-agent -s)"
          ssh-add "$KEY"
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

          set +e
          SSH_OUT=$(ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -T git@github.com 2>&1)
          set -e
          echo "$SSH_OUT"
          if ! echo "$SSH_OUT" | grep -qi "successfully authenticated"; then
            echo "::error::SSH to github.com failed (publickey)."
            exit 1
          fi

          git ls-remote git@github.com:abx-git/agm.github.io.git HEAD
          echo "SSH preflight OK."

      - name: Ensure GitHub Pages is enabled on agm.github.io
        env:
          AGM_GHIO_DEPLOY: ${{ secrets.AGM_GHIO_DEPLOY }}
          BLUEPRINT_PATTERN_GHIO_DEPLOY: ${{ secrets.BLUEPRINT_PATTERN_GHIO_DEPLOY }}
        run: |
          set -euo pipefail
          TOKEN="${AGM_GHIO_DEPLOY:-${BLUEPRINT_PATTERN_GHIO_DEPLOY:-}}"
          if [ -z "$TOKEN" ]; then
            echo "::notice::No AGM_GHIO_DEPLOY — skipping Pages API. Ensure Pages is on (main / /)."
            exit 0
          fi
          echo "::add-mask::$TOKEN"
          API="https://api.github.com/repos/abx-git/agm.github.io/pages"
          STATUS=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API")
          if [ "$STATUS" = "200" ]; then
            echo "GitHub Pages already enabled."
            cat /tmp/pages.json
            exit 0
          fi
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "::warning::Pages API auth failed (HTTP $STATUS). Enable Pages manually if needed."
            cat /tmp/pages.json || true
            exit 0
          fi
          if [ "$STATUS" != "404" ]; then
            echo "::error::Unexpected Pages API status $STATUS"
            cat /tmp/pages.json
            exit 1
          fi
          curl -fsSL -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API" \
            -d '{"build_type":"legacy","source":{"branch":"main","path":"/"}}'
          echo "GitHub Pages enabled."

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/studio/package-lock.json

      - name: Sync workflow prompts into assistant + studio data
        run: python3 scripts/sync-assistant-data.py

      - name: Build Review Studio
        run: |
          set -euo pipefail
          cd docs/studio
          npm ci
          npm run build

      - name: Deploy docs/studio/dist to agm.github.io
        run: |
          set -euo pipefail
          KEY="${DEPLOY_KEY_PATH}"
          eval "$(ssh-agent -s)"
          ssh-add "$KEY"
          export GIT_SSH_COMMAND="ssh -i $KEY -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"

          SITE="${RUNNER_TEMP}/agm.github.io"
          rm -rf "$SITE"
          git clone --depth 1 git@github.com:abx-git/agm.github.io.git "$SITE"

          find "$SITE" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          rsync -a docs/studio/dist/ "$SITE/"

          touch "$SITE/.nojekyll"

          mkdir -p "$SITE/legacy-assistant"
          cat > "$SITE/legacy-assistant/index.html" <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0;url=../" />
            <title>Moved to AGM Review Studio</title>
          </head>
          <body>
            <p>The AGM Assistant is now part of <a href="../">AGM Review Studio</a> (Workflows tab).</p>
          </body>
          </html>
          HTML

          cd "$SITE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No content changes — nothing to push."
            exit 0
          fi
          git commit -m "Deploy AGM Review Studio from agm@${GITHUB_SHA:0:7}"
          git push origin main
          echo "Deployed. https://abx-git.github.io/agm.github.io/"
