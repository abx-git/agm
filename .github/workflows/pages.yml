name: Deploy Blueprint Assistant (GitHub Pages)

# Publishes docs/assistant/ to https://github.com/abx-git/agm.github.io
# Live URL: https://abx-git.github.io/agm.github.io/

on:
  push:
    branches: [main]
    paths:
      - 'docs/assistant/**'
      - 'prompts/adopt-standalone.md'
      - 'prompts/workflows/**'
      - 'scripts/sync-assistant-data.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: deploy-agm-github-io
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require deploy key
        env:
          ACTIONS_DEPLOY_KEY: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          if [ -z "${ACTIONS_DEPLOY_KEY:-}" ]; then
            echo "::error::Add repo secret ACTIONS_DEPLOY_KEY (private SSH key whose public key is a write deploy key on abx-git/agm.github.io). See docs/assistant/GITHUB-PAGES-SETUP.md"
            exit 1
          fi

      - name: Ensure GitHub Pages is enabled on agm.github.io
        env:
          AGM_GHIO_DEPLOY: ${{ secrets.AGM_GHIO_DEPLOY }}
          BLUEPRINT_PATTERN_GHIO_DEPLOY: ${{ secrets.BLUEPRINT_PATTERN_GHIO_DEPLOY }}
        run: |
          set -euo pipefail
          TOKEN="${AGM_GHIO_DEPLOY:-${BLUEPRINT_PATTERN_GHIO_DEPLOY:-}}"
          if [ -z "$TOKEN" ]; then
            echo "::notice::No AGM_GHIO_DEPLOY secret — skipping Pages API enable. Ensure Pages is on for agm.github.io (main / /)."
            exit 0
          fi
          echo "::add-mask::$TOKEN"
          API="https://api.github.com/repos/abx-git/agm.github.io/pages"
          STATUS=$(curl -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API")
          if [ "$STATUS" = "200" ]; then
            echo "GitHub Pages already enabled."
            cat /tmp/pages.json
            exit 0
          fi
          if [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "::warning::Pages API auth failed (HTTP $STATUS). Deploy continues via deploy key; enable Pages manually if needed."
            cat /tmp/pages.json || true
            exit 0
          fi
          if [ "$STATUS" != "404" ]; then
            echo "::error::Unexpected Pages API status $STATUS"
            cat /tmp/pages.json
            exit 1
          fi
          echo "Enabling GitHub Pages (branch main, /)…"
          curl -fsSL -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API" \
            -d '{"build_type":"legacy","source":{"branch":"main","path":"/"}}'
          echo "GitHub Pages enabled."

      - name: Sync workflow prompts into assistant data
        run: python3 scripts/sync-assistant-data.py

      - name: Deploy to agm.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: abx-git/agm.github.io
          publish_branch: main
          publish_dir: ./docs/assistant
          keep_files: true
          commit_message: 'Deploy Blueprint Assistant from agm@'
